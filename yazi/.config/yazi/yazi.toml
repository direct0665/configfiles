# ~/.config/yazi/yazi.toml
# Paul's Universal Yazi Config – Optimiert für Arch & macOS

[manager]
ratio          = [1, 2, 4]       # Verhältnis: Parent | Current | Preview
sort_by        = "natural"       # Natürliche Sortierung
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true
linemode       = "size"          # Zeigt Dateigrößen an

[preview]
tab_size       = 2
max_width      = 1200
max_height     = 900
cache_dir      = ""
image_filter   = "triangle"
image_quality  = 75
sixel_scale    = 1.0
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
# Kaskadierende Editoren: Yazi probiert die Liste von oben nach unten
edit = [
  { run = 'zed "$@"', desc = "Zed (macOS)", block = false },
  { run = 'zeditor "$@"', desc = "Zed (Arch)", block = false },
  { run = '${EDITOR:-vi} "$@"', desc = "Terminal Editor", block = true },
]
# Kaskadierende System-Öffner
open = [
  { run = 'open "$@"', desc = "Open (macOS)", orphan = true },
  { run = 'xdg-open "$@"', desc = "Open (Linux)", orphan = true },
]
reveal = [
  { run = 'open "$(dirname "$1")"', desc = "Reveal (macOS)", orphan = true },
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal (Linux)", orphan = true },
]
extract = [
  { run = 'unar "$1"', desc = "Extract here" },
]
play = [
  { run = 'mpv "$@"', orphan = true, desc = "Play" },
]

[open]
rules = [
  # 1. Sicherster Weg für macOS: Dateiendungen explizit matchen
  [open]
  rules = [

    { name = "*.{txt,md,js,ts,toml,conf,json,zsh,sh,lua,yaml,yml,nix,c,cpp,h,py,rs,go}", use = ["edit"] },

    # Für alle anderen Textdateien (auch ohne Endung)
    { mime = "text/*", use = ["edit"] },
  { mime = "application/json", use = ["edit", "reveal"] },
  { mime = "application/xml",  use = ["edit", "reveal"] },

  # Bilder, Video, Audio
  { mime = "image/*",       use = ["open", "reveal"] },
  { mime = "video/*",       use = ["play", "reveal"] },
  { mime = "audio/*",       use = ["play", "reveal"] },

  # Archive
  { mime = "application/zip",            use = ["extract", "reveal"] },
  { mime = "application/x-tar",          use = ["extract", "reveal"] },
  { mime = "application/x-bzip2",        use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed",use = ["extract", "reveal"] },
  { mime = "application/x-rar",          use = ["extract", "reveal"] },

  # PDF
  { mime = "application/pdf", use = ["open", "reveal"] },

  # 3. Der ultimative Fallback für alles andere
  { name = "*", use = ["open", "edit", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512 MB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
preload = [
  # Bild-Vorschau
  { mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
  { mime = "image/*", run = "default" },
  # Video-Thumbnail
  { mime = "video/*", run = "video-thumb" },
  # PDF-Vorschau
  { mime = "application/pdf", run = "pdf-thumb" },
]
fetchers = [
  # Git-Status in der Dateiliste
  { id = "git", name = "*", run = "git" },
]

[input]
cursor_blink = true

[confirm]
trash_title    = "Trash {n} selected file(s)?"
trash_origin   = "top-center"
trash_offset   = [0, 2, 50, 3]
delete_title   = "Permanently delete {n} selected file(s)?"
delete_origin  = "top-center"
delete_offset  = [0, 2, 50, 3]
overwrite_title   = "Overwrite file?"
quit_title     = "Quit?"

[log]
enabled = false
