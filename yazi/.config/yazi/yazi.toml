# ~/.config/yazi/yazi.toml
# Angepasst an die 2026-Syntax (Version 26.1.22)

[mgr]
ratio          = [ 1, 2, 4 ]
sort_by        = "natural"
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[opener]
# Editoren (IDs für die Regeln unten)
# %s ist der Platzhalter für den Dateinamen in der neuen Version
zed_mac    = [ { run = 'zed %s', desc = "Zed (macOS)", block = false } ]
zed_arch   = [ { run = 'zeditor %s', desc = "Zed (Arch)", block = false } ]
term_edit  = [ { run = '${EDITOR:-vi} %s', desc = "Editor", block = true } ]

# System-Öffner
open_mac   = [ { run = 'open %s', desc = "Open", for = "macos" } ]
open_linux = [ { run = 'xdg-open %s', desc = "Open", for = "linux" } ]

[open]
rules = [
	# 1. Ordner
	{ url = "*/", use = [ "open_mac", "open_linux" ] },

	# 2. Text & Code (Erzwingt deine Editoren)
	{ mime = "text/*", use = [ "zed_mac", "zed_arch", "term_edit" ] },
	{ mime = "application/json", use = [ "zed_mac", "zed_arch", "term_edit" ] },
	{ name = "*.{toml,conf,zsh,sh,lua,yaml,yml,py,rs}", use = [ "zed_mac", "zed_arch", "term_edit" ] },

	# 3. Medien
	{ mime = "image/*", use = [ "open_mac", "open_linux" ] },
	{ mime = "video/*", use = [ "open_mac", "open_linux" ] },
	{ mime = "application/pdf", use = [ "open_mac", "open_linux" ] },

	# 4. Globaler Fallback
	{ url = "*", use = [ "open_mac", "open_linux", "term_edit" ] },
]

[preview]
tab_size      = 2
max_width     = 1200
max_height    = 900
image_filter  = "triangle"
image_quality = 75

[plugin]
fetchers = [
	{ id = "mime", url = "*/", run = "mime.dir", prio = "high" },
]
