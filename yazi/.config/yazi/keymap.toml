# ~/.config/yazi/keymap.toml
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
keymap = [
	{ on = "<Esc>", run = "escape", desc = "Abbrechen" },
	{ on = "q",     run = "quit",   desc = "Beenden" },
	{ on = "<C-c>", run = "close",  desc = "Schließen" },

	# Hopping & Navigation
	{ on = "k", run = "arrow prev", desc = "Hoch" },
	{ on = "j", run = "arrow next", desc = "Runter" },
	{ on = "h", run = "leave",      desc = "Zurück" },
	{ on = "l", run = "enter",      desc = "Betreten" },
	{ on = [ "g", "g" ], run = "arrow top", desc = "Anfang" },
	{ on = "G",          run = "arrow bot", desc = "Ende" },

	# Öffnen (Der Fix)
	{ on = "<Enter>", run = "open",              desc = "Öffnen" },
	{ on = "e",       run = "open --interactive", desc = "Öffnen mit..." },

	# Auswahl
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Markieren" },
	{ on = "v",       run = "visual_mode",          desc = "Visual Mode" },

	# Operationen
	{ on = "y", run = "yank",         desc = "Kopieren" },
	{ on = "x", run = "yank --cut",   desc = "Ausschneiden" },
	{ on = "p", run = "paste",        desc = "Einfügen" },
	{ on = "d", run = "remove",       desc = "Löschen" },
	{ on = "a", run = "create",       desc = "Erstellen" },
	{ on = "r", run = "rename --cursor=before_ext", desc = "Umbenennen" },

	# Suche & Filter
	{ on = "f", run = "filter --smart", desc = "Filter" },
	{ on = "/", run = "find --smart",   desc = "Suche" },
	{ on = "s", run = "search --via=fd", desc = "FD Suche" },
	{ on = "S", run = "search --via=rg", desc = "RG Suche" },

	# Sortierung
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ], desc = "Sort: Zeit" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],   desc = "Sort: Größe" },
	{ on = [ ",", "n" ], run = [ "sort natural --reverse=no", "linemode none" ], desc = "Sort: Normal" },

	# Hilfe
	{ on = "~", run = "help", desc = "Hilfe" },
]
