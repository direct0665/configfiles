# vim:fileencoding=utf-8:ft=conf
# ZSH Konfiguration Paul - Kitty Edition

# --- Fonts ---
# Testlauf mit JetBrains Mono (Schärfer auf Retina, mehr Platz)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Cursor (Pinker Akzent passend zum Prompt) ---
cursor           #FF0080
cursor_text_color #111111
cursor_shape     beam
cursor_trail     3
cursor_trail_decay 0.1 0.4

# --- Window Layout & Design ---
window_padding_width 10
remember_window_size  yes
initial_window_width  1000
initial_window_height 650
confirm_os_window_close 0
placement_strategy center
inactive_text_alpha 0.7

# --- Background & Transparency (DEINE ORIGINAL-WERTE) ---
background         #000000
foreground         #dddddd
background_opacity 0.6
background_blur    0

# --- Tab Bar (Modern Powerline Style) ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #000
active_tab_background   #FF0080
active_tab_font_style   bold
inactive_tab_foreground #444
inactive_tab_background #222

# --- Performance & Advanced ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes
shell_integration enabled
allow_remote_control yes
listen_on        unix:/tmp/mykitty

# --- Layouts ---
enabled_layouts  tall,stack,grid,fat

# --- macOS Tweaks ---
macos_titlebar_color            background
macos_option_as_alt             yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in      window

# --- Keybindings (Kitty Mod: Ctrl+Shift) ---
kitty_mod ctrl+shift

# Fenster- & Tab-Management (öffnet im aktuellen Verzeichnis)
map kitty_mod+enter launch --cwd=current
map kitty_mod+t     launch --type=tab --cwd=current
map kitty_mod+w     close_window
map kitty_mod+z     toggle_layout stack

# Navigation
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab
map kitty_mod+up    scroll_line_up
map kitty_mod+down  scroll_line_down

# Hints Kitten (Navigation ohne Maus)
map kitty_mod+p>f kitten hints --type path --program default
map kitty_mod+p>u kitten hints --type url
map kitty_mod+p>w kitten hints --type word --program @

# --- Lokale Anpassungen (NICHT im Git!) ---
include local.conf
